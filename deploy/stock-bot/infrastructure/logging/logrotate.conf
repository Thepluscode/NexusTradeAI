# Log Rotation Configuration for NexusTradeAI
# ============================================
# Prevents log files from filling disk space

# Trading Bot Logs
/Users/theophilusogieva/Desktop/NexusTradeAI/clients/bot-dashboard/logs/*.log {
    # Rotate daily
    daily

    # Keep 30 days of logs
    rotate 30

    # Compress old logs
    compress
    delaycompress

    # Don't error if log file missing
    missingok

    # Don't rotate empty logs
    notifempty

    # Create new log with these permissions
    create 0644 root root

    # Run after rotation
    postrotate
        # Signal bot to reopen log file (if needed)
        # docker-compose exec trading-bot kill -USR1 1 2>/dev/null || true
    endscript

    # Maximum size before rotation (even if daily)
    size 100M

    # Start numbering from 1 (not 0)
    start 1

    # Use date as extension
    dateext
    dateformat -%Y%m%d

    # Keep extension when compressing
    extension .log

    # Share scripts between log files
    sharedscripts
}

# Deployment Logs
/Users/theophilusogieva/Desktop/NexusTradeAI/logs/deploy-*.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    size 50M
}

# Backup Logs
/Users/theophilusogieva/Desktop/NexusTradeAI/logs/backup-*.log {
    weekly
    rotate 12
    compress
    missingok
    notifempty
}

# Health Check Logs
/Users/theophilusogieva/Desktop/NexusTradeAI/logs/health-*.log {
    daily
    rotate 7
    compress
    missingok
    notifempty
}

# Application Error Logs
/Users/theophilusogieva/Desktop/NexusTradeAI/logs/error.log {
    daily
    rotate 60
    compress
    delaycompress
    missingok
    notifempty
    size 50M

    # Send alert on error log rotation (indicates errors occurred)
    postrotate
        echo "Error log rotated - review for issues" | mail -s "NexusTradeAI Error Log" admin@example.com
    endscript
}
