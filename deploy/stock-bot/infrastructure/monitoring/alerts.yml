# Prometheus Alerting Rules
# ==========================
# Alerts for critical trading bot conditions

groups:
  - name: trading_alerts
    interval: 30s
    rules:
      # Memory Alerts
      - alert: HighMemoryUsage
        expr: trading_bot_memory_heap_usage_percent > 75
        for: 2m
        labels:
          severity: warning
          component: memory
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is at {{ $value }}% (threshold: 75%)"

      - alert: CriticalMemoryUsage
        expr: trading_bot_memory_heap_usage_percent > 90
        for: 1m
        labels:
          severity: critical
          component: memory
        annotations:
          summary: "CRITICAL: Memory usage critical"
          description: "Memory usage is at {{ $value }}% (threshold: 90%). Bot may crash soon."

      - alert: MemoryLeakSuspected
        expr: rate(trading_bot_memory_heap_used_bytes[10m]) > 0
        for: 30m
        labels:
          severity: warning
          component: memory
        annotations:
          summary: "Potential memory leak detected"
          description: "Memory usage has been steadily increasing for 30 minutes"

      # Trading Performance Alerts
      - alert: LowWinRate
        expr: trading_bot_win_rate_percent < 40
        for: 5m
        labels:
          severity: warning
          component: strategy
        annotations:
          summary: "Win rate below 40%"
          description: "Strategy {{ $labels.strategy }} win rate: {{ $value }}%"

      - alert: NegativePnL
        expr: trading_bot_pnl_total_usd < -1000
        for: 1m
        labels:
          severity: critical
          component: risk
        annotations:
          summary: "Daily loss limit approaching"
          description: "Total P&L is ${{ $value }} (threshold: -$1000)"

      - alert: HighDrawdown
        expr: trading_bot_max_drawdown_percent > 20
        for: 2m
        labels:
          severity: critical
          component: risk
        annotations:
          summary: "Maximum drawdown exceeded"
          description: "Drawdown is {{ $value }}% (threshold: 20%)"

      - alert: TooManyPositions
        expr: sum(trading_bot_active_positions) > 10
        for: 1m
        labels:
          severity: warning
          component: risk
        annotations:
          summary: "Too many active positions"
          description: "Active positions: {{ $value }} (threshold: 10)"

      # System Health Alerts
      - alert: APIDown
        expr: trading_bot_api_health == 0
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API connection lost"
          description: "{{ $labels.api_name }} is not responding"

      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(trading_bot_api_latency_ms_bucket[5m])) > 1000
        for: 3m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API latency"
          description: "{{ $labels.api_name }} latency: {{ $value }}ms (threshold: 1000ms)"

      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(trading_bot_db_query_duration_ms_bucket[5m])) > 100
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "95th percentile query time: {{ $value }}ms (threshold: 100ms)"

      - alert: HighErrorRate
        expr: rate(trading_bot_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High error rate detected"
          description: "Error rate: {{ $value }}/s for {{ $labels.error_type }}"

      - alert: BotDown
        expr: up{job="trading-bot"} == 0
        for: 1m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Trading bot is down"
          description: "Bot has been unreachable for 1 minute"

      # Risk Management Alerts
      - alert: RiskLimitBreach
        expr: increase(trading_bot_risk_limit_breaches_total[5m]) > 0
        labels:
          severity: critical
          component: risk
        annotations:
          summary: "Risk limit breached"
          description: "{{ $labels.limit_type }} limit was breached"

      - alert: HighLeverage
        expr: trading_bot_leverage_ratio > 2
        for: 1m
        labels:
          severity: warning
          component: risk
        annotations:
          summary: "High leverage detected"
          description: "Current leverage: {{ $value }}x (threshold: 2x)"

      - alert: HighPositionConcentration
        expr: trading_bot_position_concentration_percent > 30
        for: 2m
        labels:
          severity: warning
          component: risk
        annotations:
          summary: "Position concentration too high"
          description: "{{ $labels.symbol }} represents {{ $value }}% of portfolio"

      # Execution Alerts
      - alert: HighSlippage
        expr: histogram_quantile(0.95, rate(trading_bot_slippage_bps_bucket[5m])) > 10
        for: 3m
        labels:
          severity: warning
          component: execution
        annotations:
          summary: "High slippage detected"
          description: "95th percentile slippage: {{ $value }} bps (threshold: 10 bps)"

      - alert: LowFillRate
        expr: trading_bot_order_fill_rate_percent < 80
        for: 5m
        labels:
          severity: warning
          component: execution
        annotations:
          summary: "Low order fill rate"
          description: "Fill rate: {{ $value }}% (threshold: 80%)"

      - alert: HighTradeLatency
        expr: histogram_quantile(0.95, rate(trading_bot_trade_latency_ms_bucket[5m])) > 2000
        for: 3m
        labels:
          severity: warning
          component: execution
        annotations:
          summary: "High trade execution latency"
          description: "95th percentile latency: {{ $value }}ms (threshold: 2000ms)"
