name: Morning Briefing

# Runs Mon-Fri at ~8:33 AM ET year-round (DST-aware via dual cron lines).
# - EDT (Mar-Oct): 12:33 UTC = 8:33 EDT
# - EST (Nov-Feb): 13:33 UTC = 8:33 EST
# Brief misalignment (~1h) during the 1-2 week DST transition windows; we accept that.
# The job dedupes itself: only runs if the *current* UTC hour matches the season's expected hour.
# Read-only: hits health + trade endpoints, never writes/trades.
# Security note: no untrusted github.event.* inputs are interpolated.

on:
  schedule:
    - cron: '33 12 * * 1-5'   # EDT window
    - cron: '33 13 * * 1-5'   # EST window
  workflow_dispatch: {}

jobs:
  briefing:
    name: Morning Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: DST guard (only run when local ET hour = 8)
        id: dst_guard
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Both cron lines (12:33 UTC + 13:33 UTC) fire daily, but only one is
          # the real 8:33 AM ET depending on DST. Set proceed=true only on the
          # right one. Manual workflow_dispatch always proceeds.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "manual run — proceeding"
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          if [ "$ET_HOUR" = "08" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "ET hour is 08 — proceeding with briefing"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "ET hour is $ET_HOUR — off-season cron firing; skipping all subsequent steps"
          fi

      - name: Stock Bot health
        if: steps.dst_guard.outputs.proceed == 'true'
        id: stock_health
        run: |
          # [2026-06-06] Source from /api/health/detailed — the bare /health returns
          # {healthy,checks,...} with no .status field, so the old '.status // "down"' parse
          # reported every bot down. Status reflects OPERATIONAL health, not the permanent
          # trading-edge flag (always "critical" on these no-edge bots, which would make every
          # briefing a false red): down=unreachable, demo=creds failed over, scan-stalled=loop
          # not advancing, else ok. Also carries real lifetime P&L.
          R=$(curl -sf --max-time 15 https://nexus-stock-bot-production.up.railway.app/api/health/detailed || echo '{}')
          echo "status=$(echo "$R" | jq -r 'if (.bot|not) then "down" elif (.demoMode==true) then "demo" elif (.status.checks.scan.healthy==false) then "scan-stalled" else "ok" end')" >> "$GITHUB_OUTPUT"
          echo "pnl_total=$(echo "$R" | jq -r '.pnl.total // "?"')" >> "$GITHUB_OUTPUT"

      - name: Crypto Bot health
        if: steps.dst_guard.outputs.proceed == 'true'
        id: crypto_health
        run: |
          R=$(curl -sf --max-time 15 https://nexus-crypto-bot-production.up.railway.app/api/health/detailed || echo '{}')
          echo "status=$(echo "$R" | jq -r 'if (.bot|not) then "down" elif (.demoMode==true) then "demo" elif (.status.checks.scan.healthy==false) then "scan-stalled" else "ok" end')" >> "$GITHUB_OUTPUT"
          echo "pnl_total=$(echo "$R" | jq -r '.pnl.total // "?"')" >> "$GITHUB_OUTPUT"

      - name: Forex Bot health
        if: steps.dst_guard.outputs.proceed == 'true'
        id: forex_health
        run: |
          R=$(curl -sf --max-time 15 https://nexus-forex-bot-production.up.railway.app/api/health/detailed || echo '{}')
          echo "status=$(echo "$R" | jq -r 'if (.bot|not) then "down" elif (.demoMode==true) then "demo" elif (.status.checks.scan.healthy==false) then "scan-stalled" else "ok" end')" >> "$GITHUB_OUTPUT"
          echo "pnl_total=$(echo "$R" | jq -r '.pnl.total // "?"')" >> "$GITHUB_OUTPUT"

      - name: Strategy Bridge health
        if: steps.dst_guard.outputs.proceed == 'true'
        id: bridge_health
        run: |
          R=$(curl -sf --max-time 15 https://nexus-strategy-bridge-production.up.railway.app/health || echo '{"status":"down"}')
          echo "status=$(echo "$R" | jq -r '.status // "down"')" >> "$GITHUB_OUTPUT"

      - name: Trades summary + open positions (single endpoint)
        if: steps.dst_guard.outputs.proceed == 'true'
        id: trades
        run: |
          # /api/trades returns {success, count, trades:[...]}. pnl_pct is a string
          # decimal (e.g., "0.0030"); status is "closed" or "open"; closed trades have
          # exit_time set. /api/positions doesn't exist on these bots — derive open
          # count from the same /api/trades response (status == "open").
          fetch_bot() {
            local url="$1"
            local raw n_24h pnl_24h n_open
            raw=$(curl -sf --max-time 15 "$url" 2>/dev/null || echo '{"trades":[]}')
            n_24h=$(echo "$raw" | jq '[.trades[]? | select(.status=="closed") | select(.exit_time != null) | select((.exit_time | fromdateiso8601) > (now - 86400))] | length' 2>/dev/null || echo 0)
            pnl_24h=$(echo "$raw" | jq '[.trades[]? | select(.status=="closed") | select(.exit_time != null) | select((.exit_time | fromdateiso8601) > (now - 86400)) | (.pnl_pct // "0") | tonumber] | add // 0 | . * 10000 | round / 100' 2>/dev/null || echo 0)
            n_open=$(echo "$raw" | jq '[.trades[]? | select(.status=="open")] | length' 2>/dev/null)
            [ -z "$n_open" ] && n_open="?"
            # default to 0 if jq returned empty
            [ -z "$n_24h" ] && n_24h=0
            [ -z "$pnl_24h" ] && pnl_24h=0
            echo "$n_24h $pnl_24h $n_open"
          }
          # /api/trades?limit=N — bump to 100 so we don't miss intraday tail in busy periods
          read -r S_N S_PNL S_OPEN < <(fetch_bot 'https://nexus-stock-bot-production.up.railway.app/api/trades?limit=100')
          read -r C_N C_PNL C_OPEN < <(fetch_bot 'https://nexus-crypto-bot-production.up.railway.app/api/trades?limit=100')
          read -r F_N F_PNL F_OPEN < <(fetch_bot 'https://nexus-forex-bot-production.up.railway.app/api/trades?limit=100')
          {
            echo "stock_24h=$S_N";   echo "stock_pnl=$S_PNL";   echo "stock_open=$S_OPEN"
            echo "crypto_24h=$C_N";  echo "crypto_pnl=$C_PNL";  echo "crypto_open=$C_OPEN"
            echo "forex_24h=$F_N";   echo "forex_pnl=$F_PNL";   echo "forex_open=$F_OPEN"
          } >> "$GITHUB_OUTPUT"

      - name: Compose & send Telegram briefing
        if: steps.dst_guard.outputs.proceed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          S_STATUS: ${{ steps.stock_health.outputs.status }}
          C_STATUS: ${{ steps.crypto_health.outputs.status }}
          F_STATUS: ${{ steps.forex_health.outputs.status }}
          B_STATUS: ${{ steps.bridge_health.outputs.status }}
          S_TRADES: ${{ steps.trades.outputs.stock_24h }}
          S_PNL: ${{ steps.trades.outputs.stock_pnl }}
          C_TRADES: ${{ steps.trades.outputs.crypto_24h }}
          C_PNL: ${{ steps.trades.outputs.crypto_pnl }}
          F_TRADES: ${{ steps.trades.outputs.forex_24h }}
          F_PNL: ${{ steps.trades.outputs.forex_pnl }}
          S_OPEN: ${{ steps.trades.outputs.stock_open }}
          C_OPEN: ${{ steps.trades.outputs.crypto_open }}
          F_OPEN: ${{ steps.trades.outputs.forex_open }}
          S_PNL_TOTAL: ${{ steps.stock_health.outputs.pnl_total }}
          C_PNL_TOTAL: ${{ steps.crypto_health.outputs.pnl_total }}
          F_PNL_TOTAL: ${{ steps.forex_health.outputs.pnl_total }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::Telegram credentials not configured — skipping send"
            exit 0
          fi
          # ✅ ok · ⚠️ degraded (demo creds / scan stalled) · 🔴 down/unreachable
          icon() { case "$1" in ok) printf '✅' ;; demo|scan-stalled) printf '⚠️' ;; *) printf '🔴' ;; esac; }
          DATE=$(date -u +"%a %b %d")
          # Build message with literal newlines; --data-urlencode handles all escaping.
          # Per bot: status icon + word, open positions, 24h trades & P&L%, and lifetime $ P&L.
          MSG=$(printf '☀️ Morning Briefing — %s\n\n%s Stock  [%s] · %s open · 24h: %s trades, %s%% · total $%s\n%s Crypto [%s] · %s open · 24h: %s trades, %s%% · total $%s\n%s Forex  [%s] · %s open · 24h: %s trades, %s%% · total $%s\n%s Bridge [%s]\n' \
            "$DATE" \
            "$(icon "$S_STATUS")" "$S_STATUS" "$S_OPEN" "$S_TRADES" "$S_PNL" "$S_PNL_TOTAL" \
            "$(icon "$C_STATUS")" "$C_STATUS" "$C_OPEN" "$C_TRADES" "$C_PNL" "$C_PNL_TOTAL" \
            "$(icon "$F_STATUS")" "$F_STATUS" "$F_OPEN" "$F_TRADES" "$F_PNL" "$F_PNL_TOTAL" \
            "$(icon "$B_STATUS")" "$B_STATUS")
          # Capture full response so failures show the API error code.
          RESPONSE=$(curl -s -w '\nHTTP:%{http_code}' --max-time 10 \
            --get \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" 2>&1)
          STATUS=$(echo "$RESPONSE" | grep -oE 'HTTP:[0-9]+' | tail -1 | cut -d: -f2)
          if [ "$STATUS" != "200" ]; then
            BODY=$(echo "$RESPONSE" | sed -E 's/^HTTP:[0-9]+$//' | tr -d '\n')
            echo "::warning::Telegram send failed — HTTP $STATUS: $BODY"
          else
            echo "Telegram send OK"
          fi

      - name: Step summary
        if: always() && steps.dst_guard.outputs.proceed == 'true'
        env:
          S_STATUS: ${{ steps.stock_health.outputs.status }}
          C_STATUS: ${{ steps.crypto_health.outputs.status }}
          F_STATUS: ${{ steps.forex_health.outputs.status }}
          B_STATUS: ${{ steps.bridge_health.outputs.status }}
          S_TRADES: ${{ steps.trades.outputs.stock_24h }}
          S_PNL: ${{ steps.trades.outputs.stock_pnl }}
          C_TRADES: ${{ steps.trades.outputs.crypto_24h }}
          C_PNL: ${{ steps.trades.outputs.crypto_pnl }}
          F_TRADES: ${{ steps.trades.outputs.forex_24h }}
          F_PNL: ${{ steps.trades.outputs.forex_pnl }}
          S_OPEN: ${{ steps.trades.outputs.stock_open }}
          C_OPEN: ${{ steps.trades.outputs.crypto_open }}
          F_OPEN: ${{ steps.trades.outputs.forex_open }}
          S_PNL_TOTAL: ${{ steps.stock_health.outputs.pnl_total }}
          C_PNL_TOTAL: ${{ steps.crypto_health.outputs.pnl_total }}
          F_PNL_TOTAL: ${{ steps.forex_health.outputs.pnl_total }}
        run: |
          {
            echo "## Morning Briefing"
            echo
            echo "_Status reflects operational health (down/demo/scan-stalled/ok), not the no-edge trading flag._"
            echo
            echo "| Service | Status | Open | 24h trades | 24h P&L (sum %) | Total P&L (\$) |"
            echo "|---|---|---|---|---|---|"
            echo "| Stock | ${S_STATUS} | ${S_OPEN} | ${S_TRADES} | ${S_PNL} | ${S_PNL_TOTAL} |"
            echo "| Crypto | ${C_STATUS} | ${C_OPEN} | ${C_TRADES} | ${C_PNL} | ${C_PNL_TOTAL} |"
            echo "| Forex | ${F_STATUS} | ${F_OPEN} | ${F_TRADES} | ${F_PNL} | ${F_PNL_TOTAL} |"
            echo "| Bridge | ${B_STATUS} | — | — | — | — |"
          } >> "$GITHUB_STEP_SUMMARY"
