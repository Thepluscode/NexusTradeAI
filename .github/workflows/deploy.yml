name: Deploy

# Triggered only on push to main (after CI passes).
#
# What this does:
#   1. Builds the React dashboard and commits the dist into deploy/dashboard/dist/
#      Railway's GitHub auto-deploy picks this up and serves the pre-built bundle.
#   2. Waits for Railway to deploy all services, then runs post-deploy smoke tests.
#
# Railway deploys automatically via GitHub integration — no CLI needed.
# rootDirectory for each service is set in Railway dashboard settings:
#   nexus-stock-bot      → deploy/stock-bot
#   nexus-forex-bot      → deploy/forex-bot
#   nexus-crypto-bot     → deploy/crypto-bot
#   nexus-strategy-bridge → services/strategy-engine
#   nexus-dashboard      → deploy/dashboard

on:
  push:
    branches: [main]

# Prevent concurrent deploys — queue them instead of cancelling
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Build dashboard and commit the bundle ─────────────────────────────────
  build-dashboard:
    name: Build dashboard bundle
    runs-on: ubuntu-latest
    outputs:
      bundle-changed: ${{ steps.check.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Need write access to push the bundle commit
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: clients/bot-dashboard/node_modules
          key: dashboard-node-modules-${{ hashFiles('clients/bot-dashboard/package.json') }}
          restore-keys: dashboard-node-modules-

      - name: Install dependencies
        working-directory: clients/bot-dashboard
        run: npm install

      # Only rebuild if frontend source files actually changed since the last bundle commit.
      # Walk back through git history skipping [skip ci] bundle commits to find the last
      # real source commit, then diff against it. This prevents a new bundle hash on every
      # bot-only push and eliminates rebase conflicts from concurrent bundle commits.
      - name: Check if frontend source changed
        id: src-changed
        run: |
          # Find the last commit that is NOT a [skip ci] bundle commit
          LAST_SRC_COMMIT=$(git log --oneline | grep -v '\[skip ci\]' | head -1 | awk '{print $1}')
          PREV_SRC_COMMIT=$(git log --oneline | grep -v '\[skip ci\]' | sed -n '2p' | awk '{print $1}')
          echo "Last real commit: $LAST_SRC_COMMIT  Previous: $PREV_SRC_COMMIT"

          if [ -z "$PREV_SRC_COMMIT" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "No previous real commit found — rebuilding"
          else
            CHANGED=$(git diff --name-only "$PREV_SRC_COMMIT" "$LAST_SRC_COMMIT" -- \
              clients/bot-dashboard/src/ \
              clients/bot-dashboard/index.html \
              clients/bot-dashboard/vite.config.ts \
              clients/bot-dashboard/package.json \
              2>/dev/null)
            if [ -z "$CHANGED" ]; then
              echo "rebuild=false" >> $GITHUB_OUTPUT
              echo "Frontend source unchanged since last real commit — reusing existing dist"
            else
              echo "rebuild=true" >> $GITHUB_OUTPUT
              echo "Frontend source changed — rebuilding"
              echo "$CHANGED"
            fi
          fi

      - name: Build
        if: steps.src-changed.outputs.rebuild == 'true'
        working-directory: clients/bot-dashboard
        env:
          VITE_NEXUS_API_SECRET: ${{ secrets.NEXUS_API_SECRET }}
        run: npm run build

      # Verify the bundle has no localhost:PORT URLs before deploying (only when rebuilt)
      - name: Assert no localhost URLs in bundle
        if: steps.src-changed.outputs.rebuild == 'true'
        run: |
          BUNDLE=$(ls clients/bot-dashboard/dist/assets/index-*.js 2>/dev/null || ls clients/bot-dashboard/dist/assets/index.js 2>/dev/null)
          if [ -z "$BUNDLE" ]; then echo "ERROR: no index bundle found"; exit 1; fi
          echo "Checking bundle: $BUNDLE"
          if grep -qo 'localhost:[0-9][0-9]*' "$BUNDLE"; then
            echo "ERROR: localhost URLs found in bundle:"
            grep -o 'localhost:[0-9][0-9]*' "$BUNDLE" | sort -u
            exit 1
          fi
          echo "OK — no localhost:PORT in bundle"

      # Verify all 4 Railway service URLs are baked in (only when rebuilt)
      - name: Assert Railway URLs in bundle
        if: steps.src-changed.outputs.rebuild == 'true'
        run: |
          BUNDLE=$(ls clients/bot-dashboard/dist/assets/index-*.js 2>/dev/null || ls clients/bot-dashboard/dist/assets/index.js 2>/dev/null)
          if [ -z "$BUNDLE" ]; then echo "ERROR: no index bundle found"; exit 1; fi
          for URL in \
            nexus-stock-bot-production.up.railway.app \
            nexus-forex-bot-production.up.railway.app \
            nexus-crypto-bot-production.up.railway.app \
            nexus-strategy-bridge-production.up.railway.app; do
            if ! grep -q "$URL" "$BUNDLE"; then
              echo "ERROR: missing URL in bundle: $URL"; exit 1
            fi
          done
          echo "OK — all Railway URLs present"

      - name: Copy dist to deploy/dashboard/
        if: steps.src-changed.outputs.rebuild == 'true'
        run: |
          rm -rf deploy/dashboard/dist/assets
          cp -r clients/bot-dashboard/dist/. deploy/dashboard/dist/

      # Deploy dirs use thin loaders (bot.js) that require the source files
      # directly from clients/bot-dashboard/ via ../../ paths. Railway clones
      # the full repo, so all source files are available. No file copying needed.
      # The deploy/*/bot.js loaders set NODE_PATH so npm-installed deps resolve.
      - name: Verify deploy loaders
        run: |
          for BOT_DIR in deploy/stock-bot deploy/forex-bot deploy/crypto-bot; do
            if ! head -1 "$BOT_DIR/bot.js" | grep -q "#!/usr/bin/env node"; then
              echo "ERROR: $BOT_DIR/bot.js is not a thin loader — expected shebang line"
              exit 1
            fi
          done
          echo "All deploy loaders verified"
          wc -l deploy/stock-bot/bot.js deploy/forex-bot/bot.js deploy/crypto-bot/bot.js

      - name: Check if dashboard bundle changed
        id: check
        run: |
          git add -f deploy/dashboard/dist/ || true
          if git diff --cached --quiet deploy/dashboard/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Dashboard bundle unchanged — skipping commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Dashboard bundle changed — will commit"
          fi

      - name: Commit and push dashboard bundle
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f deploy/dashboard/dist/
          git commit -m "chore: sync dashboard bundle [skip ci]"
          git push origin main

      # IMPORTANT — Railway watchPatterns (update in Railway dashboard):
      # Bot services now use thin loaders that require source directly.
      # watchPatterns must include the SOURCE directories, not just deploy/:
      #   nexus-stock-bot      → ["clients/bot-dashboard/**", "services/signals/**", "infrastructure/**"]
      #   nexus-forex-bot      → ["clients/bot-dashboard/**", "services/signals/**", "infrastructure/**"]
      #   nexus-crypto-bot     → ["clients/bot-dashboard/**", "services/signals/**", "infrastructure/**"]
      #   nexus-dashboard      → ["deploy/dashboard/**"]
      #   nexus-strategy-bridge → ["services/strategy-engine/**"]
      - name: Verify deploy files
        run: |
          ls -la deploy/stock-bot/bot.js deploy/forex-bot/bot.js deploy/crypto-bot/bot.js deploy/dashboard/dist/index.html

      # Trigger Railway redeploys on every push to main.
      # Bot loaders reference source files directly, so any code change needs a redeploy.
      - name: Trigger Railway redeploys
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skipping redeploy trigger"
            exit 0
          fi
          ENV_ID="71aa0246-7eb1-4309-8976-61a8838b6ab9"
          for SID in 2b939f3a 7c7c3976 baae31c1 50829ae3 a632e893; do
            echo -n "Redeploying service $SID... "
            RESP=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"$SID\\\", environmentId: \\\"$ENV_ID\\\") }\"}")
            echo "$RESP"
          done
          echo "All redeploy triggers sent"

  # ── 2. Smoke tests after Railway auto-deploys ─────────────────────────────────
  smoke-test:
    name: Post-deploy smoke tests
    runs-on: ubuntu-latest
    needs: build-dashboard

    steps:
      # Wait for Railway to pick up the push and finish deploying
      - name: Wait for Railway deployments (120s)
        run: sleep 120

      # ── Post-deploy smoke tests ───────────────────────────────────────────────
      - name: Smoke test — Stock Bot
        run: |
          for i in 1 2 3; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
              https://nexus-stock-bot-production.up.railway.app/health) && \
            [ "$CODE" = "200" ] && echo "Stock Bot OK" && break || \
            (echo "Attempt $i failed ($CODE), retrying in 20s..." && sleep 20)
          done
          [ "$CODE" = "200" ] || (echo "Stock Bot failed post-deploy health check" && exit 1)

      - name: Smoke test — Forex Bot
        run: |
          for i in 1 2 3; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
              https://nexus-forex-bot-production.up.railway.app/health) && \
            [ "$CODE" = "200" ] && echo "Forex Bot OK" && break || \
            (echo "Attempt $i failed ($CODE), retrying in 20s..." && sleep 20)
          done
          [ "$CODE" = "200" ] || (echo "Forex Bot failed post-deploy health check" && exit 1)

      - name: Smoke test — Crypto Bot
        run: |
          for i in 1 2 3; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
              https://nexus-crypto-bot-production.up.railway.app/health) && \
            [ "$CODE" = "200" ] && echo "Crypto Bot OK" && break || \
            (echo "Attempt $i failed ($CODE), retrying in 20s..." && sleep 20)
          done
          [ "$CODE" = "200" ] || (echo "Crypto Bot failed post-deploy health check" && exit 1)

      - name: Smoke test — Strategy Bridge
        run: |
          for i in 1 2 3; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 20 \
              https://nexus-strategy-bridge-production.up.railway.app/health) && \
            [ "$CODE" = "200" ] && echo "Strategy Bridge OK" && break || \
            (echo "Attempt $i failed ($CODE), retrying in 20s..." && sleep 20)
          done
          [ "$CODE" = "200" ] || (echo "Strategy Bridge failed post-deploy health check" && exit 1)

      - name: Smoke test — Dashboard
        run: |
          for i in 1 2 3; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
              https://nexus-dashboard-production-e6e6.up.railway.app/) && \
            [ "$CODE" = "200" ] && echo "Dashboard OK" && break || \
            (echo "Attempt $i failed ($CODE), retrying in 20s..." && sleep 20)
          done
          [ "$CODE" = "200" ] || (echo "Dashboard failed post-deploy health check" && exit 1)

      - name: Verify dashboard serves correct bundle (no localhost URLs)
        run: |
          # Fetch the HTML page, extract the hashed index-*.js filename, then download it
          INDEX_HTML=$(curl -s --max-time 15 "https://nexus-dashboard-production-e6e6.up.railway.app/")
          BUNDLE_PATH=$(echo "$INDEX_HTML" | grep -oP 'assets/index[^"]+\.js' | head -1)
          if [ -z "$BUNDLE_PATH" ]; then
            echo "WARNING: Could not extract bundle path from index.html — skipping"
            exit 0
          fi
          echo "Downloading bundle: $BUNDLE_PATH"
          curl -s --max-time 30 \
            "https://nexus-dashboard-production-e6e6.up.railway.app/$BUNDLE_PATH" \
            -o /tmp/bundle.js

          if grep -qo 'localhost:[0-9][0-9]*' /tmp/bundle.js; then
            echo "ERROR: localhost URLs found in live bundle"
            grep -o 'localhost:[0-9][0-9]*' /tmp/bundle.js | sort -u
            exit 1
          fi
          echo "OK — live bundle has no localhost:PORT URLs"

      # Trigger bridge warmup after all services are up so pairs trading cache is seeded.
      # Non-fatal: warmup may fail if Alpaca/OANDA creds not set, but services are still up.
      - name: Seed strategy bridge pairs cache
        continue-on-error: true
        run: |
          RESP=$(curl -s --max-time 90 -X POST \
            -H "Content-Type: application/json" \
            https://nexus-stock-bot-production.up.railway.app/api/bridge/warmup)
          echo "Warmup response: $RESP"
          SEEDED=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('seeded',[])))" 2>/dev/null || echo "?")
          FAILED=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('failed',[])))" 2>/dev/null || echo "?")
          echo "Bridge warmup: seeded=$SEEDED failed=$FAILED"
