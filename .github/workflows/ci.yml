name: CI

# Runs on every push to main and on all pull requests.
# Gates: lint → type-check → build → smoke-test live services.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 0. Run signal module unit tests ──────────────────────────────────────────
  test:
    name: Signal tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/signals

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: services/signals/node_modules
          key: signals-node-modules-${{ hashFiles('services/signals/package.json') }}
          restore-keys: signals-node-modules-

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx jest --ci --passWithNoTests

  # ── 1. Lint + type-check + production build ─────────────────────────────────
  dashboard-build:
    needs: test
    name: Dashboard — lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/bot-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: clients/bot-dashboard/node_modules
          key: dashboard-node-modules-${{ hashFiles('clients/bot-dashboard/package.json') }}
          restore-keys: dashboard-node-modules-

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run shared module tests (auth)
        run: npx jest shared/__tests__/ --ci --config '{}' --passWithNoTests

      # Upload the built dist so the deploy job can download it without rebuilding
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: clients/bot-dashboard/dist/
          retention-days: 1

  # ── 2. Smoke-test all 5 live Railway services ────────────────────────────────
  # Only runs on push to main (PRs from forks can't reach Railway).
  smoke-tests:
    name: Smoke-test Railway services
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    # Don't smoke-test before the build passes
    needs: dashboard-build

    steps:
      - name: Stock Bot — /health
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
            https://nexus-stock-bot-production.up.railway.app/health)
          echo "Stock Bot /health → $CODE"
          [ "$CODE" = "200" ]

      - name: Forex Bot — /health
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
            https://nexus-forex-bot-production.up.railway.app/health)
          echo "Forex Bot /health → $CODE"
          [ "$CODE" = "200" ]

      - name: Crypto Bot — /health
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
            https://nexus-crypto-bot-production.up.railway.app/health)
          echo "Crypto Bot /health → $CODE"
          [ "$CODE" = "200" ]

      - name: Strategy Bridge — /health
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 20 \
            https://nexus-strategy-bridge-production.up.railway.app/health)
          echo "Strategy Bridge /health → $CODE"
          [ "$CODE" = "200" ]

      - name: Dashboard — / (200 OK)
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 \
            https://nexus-dashboard-production-e6e6.up.railway.app/)
          echo "Dashboard / → $CODE"
          [ "$CODE" = "200" ]

      # Verify each status endpoint returns the fields the UI depends on.
      # Retries 3× with 15s gaps to handle mid-deploy transient failures.
      - name: API contract — Stock Bot /api/trading/status
        run: |
          for i in 1 2 3; do
            RESULT=$(curl -s --max-time 15 \
              https://nexus-stock-bot-production.up.railway.app/api/trading/status \
            | python3 -c "
          import json, sys
          body = json.load(sys.stdin)
          # Stock bot returns fields at top level AND has a nested 'data' dict.
          # Check top-level first; fall back to nested data only if top-level missing.
          d = body if 'isRunning' in body else body.get('data', body)
          missing = [k for k in ('isRunning', 'mode') if k not in d]
          if missing:
              print('FAIL'); sys.exit(1)
          print('OK — isRunning=%s mode=%s' % (d['isRunning'], d['mode']))
            " 2>&1) && echo "$RESULT" && break || \
            (echo "Attempt $i failed: $RESULT" && [ $i -lt 3 ] && sleep 15)
          done
          echo "$RESULT" | grep -q OK || (echo "Stock Bot API contract failed" && exit 1)

      - name: API contract — Forex Bot /api/forex/status
        run: |
          for i in 1 2 3; do
            RESULT=$(curl -s --max-time 15 \
              https://nexus-forex-bot-production.up.railway.app/api/forex/status \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          missing = [k for k in ('isRunning', 'mode', 'equity') if k not in d]
          if missing:
              print('FAIL'); sys.exit(1)
          print('OK — isRunning=%s equity=%s' % (d['isRunning'], d['equity']))
            " 2>&1) && echo "$RESULT" && break || \
            (echo "Attempt $i failed: $RESULT" && [ $i -lt 3 ] && sleep 15)
          done
          echo "$RESULT" | grep -q OK || (echo "Forex Bot API contract failed" && exit 1)

      - name: API contract — Crypto Bot /api/crypto/status
        run: |
          for i in 1 2 3; do
            RESULT=$(curl -s --max-time 15 \
              https://nexus-crypto-bot-production.up.railway.app/api/crypto/status \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          missing = [k for k in ('isRunning', 'mode', 'equity') if k not in d]
          if missing:
              print('FAIL'); sys.exit(1)
          print('OK — isRunning=%s equity=%s' % (d['isRunning'], d['equity']))
            " 2>&1) && echo "$RESULT" && break || \
            (echo "Attempt $i failed: $RESULT" && [ $i -lt 3 ] && sleep 15)
          done
          echo "$RESULT" | grep -q OK || (echo "Crypto Bot API contract failed" && exit 1)

