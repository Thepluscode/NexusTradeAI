name: CI

# Runs on every push to main and on all pull requests.
# Gates: lint → type-check → build → smoke-test live services.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 0. Run signal module unit tests ──────────────────────────────────────────
  test:
    name: Signal tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/signals

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: services/signals/node_modules
          key: signals-node-modules-${{ hashFiles('services/signals/package.json') }}
          restore-keys: signals-node-modules-

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx jest --ci --passWithNoTests

  # ── 1. Lint + type-check + production build ─────────────────────────────────
  dashboard-build:
    needs: test
    name: Dashboard — lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/bot-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: clients/bot-dashboard/node_modules
          key: dashboard-node-modules-${{ hashFiles('clients/bot-dashboard/package.json') }}
          restore-keys: dashboard-node-modules-

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run shared module tests (auth)
        run: npx jest shared/__tests__/ --ci --config '{}' --passWithNoTests

      # Upload the built dist so the deploy job can download it without rebuilding
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: clients/bot-dashboard/dist/
          retention-days: 1

  # ── 2. Smoke-test all 5 live Railway services ────────────────────────────────
  # Only runs on push to main (PRs from forks can't reach Railway).
  smoke-tests:
    name: Smoke-test Railway services
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    # Don't smoke-test before the build passes
    needs: dashboard-build

    steps:
      - name: Service health — all public endpoints
        run: |
          FAILURES=0
          check_service() {
            NAME="$1"
            URL="$2"
            TIMEOUT="${3:-15}"
            if ! CODE=$(curl -sS -o "/tmp/${NAME}.body" -w "%{http_code}" --max-time "$TIMEOUT" "$URL"); then
              CODE="000"
            fi
            echo "$NAME → $CODE"
            if [ "$CODE" != "200" ]; then
              echo "Response body:"
              head -c 500 "/tmp/${NAME}.body" 2>/dev/null || true
              echo
              FAILURES=$((FAILURES + 1))
            fi
          }

          check_service stock "https://nexus-stock-bot-production.up.railway.app/health" 15
          check_service forex "https://nexus-forex-bot-production.up.railway.app/health" 15
          check_service crypto "https://nexus-crypto-bot-production.up.railway.app/health" 15
          check_service bridge "https://nexus-strategy-bridge-production.up.railway.app/health" 20
          check_service dashboard "https://nexus-dashboard-production-e6e6.up.railway.app/" 15

          if [ "$FAILURES" -gt 0 ]; then
            echo "ERROR: $FAILURES service health check(s) failed"
            exit 1
          fi

      # Verify each status endpoint returns the fields the UI depends on.
      # Retries 3× with 15s gaps to handle mid-deploy transient failures.
      - name: API contract — Stock Bot /api/trading/status
        run: |
          for i in 1 2 3; do
            RESULT=$(curl -s --max-time 15 \
              https://nexus-stock-bot-production.up.railway.app/api/trading/status \
            | python3 -c "
          import json, sys
          body = json.load(sys.stdin)
          # Stock bot returns fields at top level AND has a nested 'data' dict.
          # Check top-level first; fall back to nested data only if top-level missing.
          d = body if 'isRunning' in body else body.get('data', body)
          missing = [k for k in ('isRunning', 'mode') if k not in d]
          if missing:
              print('FAIL'); sys.exit(1)
          print('OK — isRunning=%s mode=%s' % (d['isRunning'], d['mode']))
            " 2>&1) && echo "$RESULT" && break || \
            (echo "Attempt $i failed: $RESULT" && [ $i -lt 3 ] && sleep 15)
          done
          echo "$RESULT" | grep -q OK || (echo "Stock Bot API contract failed" && exit 1)

      - name: API contract — Forex Bot /api/forex/status
        run: |
          for i in 1 2 3; do
            RESULT=$(curl -s --max-time 15 \
              https://nexus-forex-bot-production.up.railway.app/api/forex/status \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          missing = [k for k in ('isRunning', 'mode', 'equity') if k not in d]
          if missing:
              print('FAIL'); sys.exit(1)
          print('OK — isRunning=%s equity=%s' % (d['isRunning'], d['equity']))
            " 2>&1) && echo "$RESULT" && break || \
            (echo "Attempt $i failed: $RESULT" && [ $i -lt 3 ] && sleep 15)
          done
          echo "$RESULT" | grep -q OK || (echo "Forex Bot API contract failed" && exit 1)

      - name: API contract — Crypto Bot /api/crypto/status
        run: |
          for i in 1 2 3; do
            RESULT=$(curl -s --max-time 15 \
              https://nexus-crypto-bot-production.up.railway.app/api/crypto/status \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          missing = [k for k in ('isRunning', 'mode', 'equity') if k not in d]
          if missing:
              print('FAIL'); sys.exit(1)
          print('OK — isRunning=%s equity=%s' % (d['isRunning'], d['equity']))
            " 2>&1) && echo "$RESULT" && break || \
            (echo "Attempt $i failed: $RESULT" && [ $i -lt 3 ] && sleep 15)
          done
          echo "$RESULT" | grep -q OK || (echo "Crypto Bot API contract failed" && exit 1)

      # Verify the unauthenticated monitoring endpoint exposes P&L / trades / positions
      # on every bot. Enforces "if present, must be correct": because smoke-tests run
      # against live Railway in parallel with this commit's own deploy, a brand-new
      # endpoint may not be live yet on the first rollout — a 404 is treated as
      # not-yet-deployed (soft pass) and self-heals on the next deploy. A 200 with a
      # broken contract is a hard failure.
      - name: API contract — /api/health/detailed (all bots)
        run: |
          check_detailed() {
            NAME="$1"; URL="$2"
            for i in 1 2 3; do
              CODE=$(curl -s -o "/tmp/${NAME}_detailed.json" -w "%{http_code}" \
                     --max-time 15 "$URL/api/health/detailed" 2>/dev/null) || CODE="000"
              if [ "$CODE" = "404" ]; then
                echo "$NAME → 404 (endpoint not live yet — will enforce after deploy completes)"
                return 0
              fi
              if [ "$CODE" = "200" ]; then
                RESULT=$(python3 -c "
          import json, sys
          b = json.load(open('/tmp/${NAME}_detailed.json'))
          for k in ('bot', 'healthy', 'pnl', 'trades', 'positions'):
              if k not in b:
                  print('FAIL — missing %s' % k); sys.exit(1)
          for k in ('today', 'total', 'winRatePct'):
              if k not in b['pnl']:
                  print('FAIL — pnl.%s missing' % k); sys.exit(1)
          for k in ('today', 'total'):
              if k not in b['trades']:
                  print('FAIL — trades.%s missing' % k); sys.exit(1)
          for k in ('live', 'dbOpen', 'list'):
              if k not in b['positions']:
                  print('FAIL — positions.%s missing' % k); sys.exit(1)
          print('OK — pnlTotal=%s trades=%s open=%s' % (
              b['pnl']['total'], b['trades']['total'], b['positions']['live']))
                " 2>&1)
                echo "$NAME → $RESULT"
                echo "$RESULT" | grep -q OK && return 0 || { echo "$NAME contract broken"; return 1; }
              fi
              echo "$NAME attempt $i: HTTP $CODE" && [ $i -lt 3 ] && sleep 15
            done
            echo "$NAME /api/health/detailed unreachable after retries"; return 1
          }
          FAILURES=0
          check_detailed stock  https://nexus-stock-bot-production.up.railway.app  || FAILURES=$((FAILURES+1))
          check_detailed forex  https://nexus-forex-bot-production.up.railway.app  || FAILURES=$((FAILURES+1))
          check_detailed crypto https://nexus-crypto-bot-production.up.railway.app || FAILURES=$((FAILURES+1))
          if [ "$FAILURES" -gt 0 ]; then
            echo "ERROR: $FAILURES /api/health/detailed contract check(s) failed"
            exit 1
          fi
