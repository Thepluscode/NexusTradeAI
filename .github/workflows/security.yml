name: Security audit

# Weekly dependency audit using only built-in npm audit — no external tokens required.
# Runs every Monday at 09:00 UTC, and can be triggered manually.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit-dashboard:
    name: npm audit — dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/bot-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/bot-dashboard/package-lock.json
      - run: npm ci
      - name: Audit (high + critical only)
        run: npm audit --audit-level=high || true
        # `|| true` — report vulnerabilities but don't fail the workflow.
        # Remove `|| true` once all high/critical advisories are resolved.

  audit-stock-bot:
    name: npm audit — stock bot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/stock-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm audit --audit-level=high || true

  audit-forex-bot:
    name: npm audit — forex bot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/forex-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm audit --audit-level=high || true

  audit-crypto-bot:
    name: npm audit — crypto bot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/crypto-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm audit --audit-level=high || true

  check-for-secrets:
    name: Scan for accidental secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks is free, open-source, requires no external token
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
