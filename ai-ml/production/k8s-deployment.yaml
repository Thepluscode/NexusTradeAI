# Kubernetes Deployment Configuration for ML Model Serving API
---
apiVersion: v1
kind: Namespace
metadata:
  name: nexustrade
  labels:
    name: nexustrade
    environment: production

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-model-config
  namespace: nexustrade
data:
  ENVIRONMENT: "production"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "8"
  API_TIMEOUT: "60"
  LOG_LEVEL: "WARNING"
  JSON_LOGS: "true"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "nexustrade"
  DB_POOL_SIZE: "10"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: ml-model-secrets
  namespace: nexustrade
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_WITH_ACTUAL_PASSWORD"
  DB_USER: "nexustrade"
  REDIS_PASSWORD: "REPLACE_WITH_ACTUAL_PASSWORD"
  JWT_SECRET_KEY: "REPLACE_WITH_ACTUAL_SECRET"
  API_KEY: "REPLACE_WITH_ACTUAL_API_KEY"

---
# PersistentVolumeClaim for model storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: nexustrade
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd

---
# Deployment for ML API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-api-deployment
  namespace: nexustrade
  labels:
    app: ml-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ml-api
  template:
    metadata:
      labels:
        app: ml-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Service account
      serviceAccountName: ml-api-sa

      # Init containers for health checks
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - 'sh'
            - '-c'
            - 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done'

        - name: wait-for-redis
          image: busybox:1.35
          command:
            - 'sh'
            - '-c'
            - 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done'

      containers:
        - name: ml-api
          image: nexustrade/ml-api:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Environment variables from ConfigMap and Secret
          envFrom:
            - configMapRef:
                name: ml-model-config
            - secretRef:
                name: ml-model-secrets

          # Resource limits
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

          # Volume mounts
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # Startup probe (for slow-starting containers)
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 30

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      # Volumes
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ml-models-pvc
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      # Pod affinity - spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ml-api
                topologyKey: kubernetes.io/hostname

---
# Service for ML API
apiVersion: v1
kind: Service
metadata:
  name: ml-api-service
  namespace: nexustrade
  labels:
    app: ml-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: ml-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# HorizontalPodAutoscaler for auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-api-hpa
  namespace: nexustrade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-api-deployment
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-api-sa
  namespace: nexustrade

---
# Role for accessing ConfigMaps and Secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ml-api-role
  namespace: nexustrade
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ml-api-rolebinding
  namespace: nexustrade
subjects:
  - kind: ServiceAccount
    name: ml-api-sa
    namespace: nexustrade
roleRef:
  kind: Role
  name: ml-api-role
  apiGroup: rbac.authorization.k8s.io

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ml-api-network-policy
  namespace: nexustrade
spec:
  podSelector:
    matchLabels:
      app: ml-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: nexustrade
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: nexustrade
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53   # DNS
        - protocol: UDP
          port: 53   # DNS
        - protocol: TCP
          port: 443  # HTTPS
