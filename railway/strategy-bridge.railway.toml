# Railway service config — Python Strategy Bridge (port 3010)
# In Railway dashboard: set Root Directory = services/strategy-engine
[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn strategy_bridge:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
