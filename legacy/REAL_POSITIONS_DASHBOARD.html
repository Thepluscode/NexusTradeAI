<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTradeAI - Real Positions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h3 {
            color: #667eea;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .card .value.positive {
            color: #10b981;
        }

        .card .value.negative {
            color: #ef4444;
        }

        .positions-table {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .positions-table h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #667eea;
            border-bottom: 2px solid #e5e7eb;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f3f4f6;
        }

        tr:hover {
            background: #f9fafb;
        }

        .symbol {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .positive {
            color: #10b981;
            font-weight: 600;
        }

        .negative {
            color: #ef4444;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 50px;
        }

        .refresh-info {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
            font-size: 0.9em;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 NexusTradeAI - Live Trading Dashboard</h1>
        <div class="subtitle">Real-time data from Alpaca Trading Account</div>

        <div id="content" class="loading">Loading positions...</div>

        <div class="refresh-info">
            Auto-refreshes every 10 seconds | Data source: Port 3005 Unified API
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('http://localhost:3005/api/dashboard');
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error);
                }

                const data = result.data;
                const account = data.account;
                const positions = data.positions;

                const html = `
                    <div class="summary-cards">
                        <div class="card">
                            <h3>Account Equity</h3>
                            <div class="value">$${account.equity.toFixed(2)}</div>
                        </div>
                        <div class="card">
                            <h3>Cash Available</h3>
                            <div class="value">$${account.cash.toFixed(2)}</div>
                        </div>
                        <div class="card">
                            <h3>Today's P/L</h3>
                            <div class="value ${account.profitToday >= 0 ? 'positive' : 'negative'}">
                                ${account.profitToday >= 0 ? '+' : ''}$${account.profitToday.toFixed(2)}
                                (${account.profitTodayPercent >= 0 ? '+' : ''}${account.profitTodayPercent.toFixed(2)}%)
                            </div>
                        </div>
                        <div class="card">
                            <h3>Active Positions</h3>
                            <div class="value">${data.activePositions}</div>
                        </div>
                    </div>

                    <div class="positions-table">
                        <h2>Active Positions (${positions.length})</h2>
                        ${positions.length > 0 ? `
                            <table>
                                <thead>
                                    <tr>
                                        <th>Symbol</th>
                                        <th>Quantity</th>
                                        <th>Avg Entry</th>
                                        <th>Current Price</th>
                                        <th>Market Value</th>
                                        <th>Unrealized P/L</th>
                                        <th>P/L %</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${positions.map(pos => `
                                        <tr>
                                            <td class="symbol">${pos.symbol}</td>
                                            <td>${pos.qty}</td>
                                            <td>$${pos.avgEntry.toFixed(2)}</td>
                                            <td>$${pos.currentPrice.toFixed(2)}</td>
                                            <td>$${pos.marketValue.toFixed(2)}</td>
                                            <td class="${pos.unrealizedPL >= 0 ? 'positive' : 'negative'}">
                                                ${pos.unrealizedPL >= 0 ? '+' : ''}$${pos.unrealizedPL.toFixed(2)}
                                            </td>
                                            <td class="${pos.unrealizedPLPercent >= 0 ? 'positive' : 'negative'}">
                                                ${pos.unrealizedPLPercent >= 0 ? '+' : ''}${pos.unrealizedPLPercent.toFixed(2)}%
                                            </td>
                                            <td>
                                                <span class="badge ${pos.unrealizedPL >= 0 ? 'badge-success' : 'badge-danger'}">
                                                    ${pos.unrealizedPL >= 0 ? '✓ Profit' : '✗ Loss'}
                                                </span>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        ` : '<p style="text-align: center; padding: 50px; color: #6b7280;">No active positions</p>'}
                    </div>
                `;

                document.getElementById('content').innerHTML = html;

            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="card" style="background: #fee2e2; color: #991b1b;">
                        <h3>Error Loading Data</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">Make sure the unified API is running on port 3005</p>
                    </div>
                `;
            }
        }

        // Load immediately
        loadDashboard();

        // Auto-refresh every 10 seconds
        setInterval(loadDashboard, 10000);
    </script>
</body>
</html>
