# Railway config — used by nexus-dashboard service
[build]
builder = "nixpacks"
buildCommand = "cd clients/bot-dashboard && npm install && npm run build"

[deploy]
startCommand = "cd clients/bot-dashboard && npm run start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
